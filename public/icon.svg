<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a12"/>
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- Left chain link -->
  <ellipse cx="188" cy="214" rx="96" ry="54"
           fill="none" stroke="url(#grad)" stroke-width="40" stroke-linecap="round"/>
  <!-- Right chain link -->
  <ellipse cx="324" cy="298" rx="96" ry="54"
           fill="none" stroke="url(#grad)" stroke-width="40" stroke-linecap="round"/>
</svg>
